{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="{% static 'app_inquerito/img/logo jmu.svg' %}" type="image/x-icon">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'app_inquerito/css/style.css' %}">
    
    <title>Formulário Enviado - JMU</title>
</head>
<body>
  <div class="container-fluid d-flex align-items-center justify-content-center min-vh-100 bg-light">
    <div class="text-center p-5 rounded-4 shadow-lg bg-white" style="max-width: 500px;">
      <div class="mb-4">
        <img src="{% static 'app_inquerito/img/logo jmu.svg' %}" alt="Logo JMU" class="mb-3" style="width: 150px;">
      </div>
      
      <h2 class="fw-bold text-success mb-3">✓ Formulário Enviado com Sucesso!</h2>
      
      <p class="text-muted mb-4">
        Obrigado por participar do Inquérito de Levantamento Estatístico Juvenil 2024/2025.
      </p>
      
      <p class="text-muted small mb-4">
        Seus dados foram registrados com sucesso em nosso banco de dados.
      </p>
      
      <div class="d-flex gap-2 justify-content-center">
        <a href="{% url 'formulario' %}" class="btn btn-primary">Novo Formulário</a>
        <a href="/" class="btn btn-secondary">Voltar ao Início</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
